<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>DonCausa — Donateurs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon">🌿</div>
        <h1>DonCausa</h1>
        <p>Association &amp; ONG</p>
    </div>
    <nav class="nav-section">
        <div class="nav-section-label">Navigation</div>
        <a class="nav-item" th:href="@{/}"><span class="icon">📊</span> Tableau de bord</a>
        <a class="nav-item" th:href="@{/campagnes}"><span class="icon">🎯</span> Campagnes</a>
        <a class="nav-item active" th:href="@{/donateurs}"><span class="icon">👥</span> Donateurs</a>
        <a class="nav-item" th:href="@{/dons}"><span class="icon">💰</span> Dons</a>
    </nav>
</aside>

<main class="main">
    <div class="topbar">
        <div>
            <h2>Donateurs</h2>
            <div class="topbar-sub">Liste des donateurs enregistrés</div>
        </div>
        <div class="topbar-actions">
            <button class="btn btn-primary" onclick="openModal('modal-donateur')">＋ Nouveau donateur</button>
        </div>
    </div>

    <div class="page-content">
        <div class="table-container">

            <!-- TOOLBAR -->
            <div class="table-toolbar">
                <div class="search-wrap">
                    <input class="search-input" type="text" id="search-input" placeholder="Rechercher un donateur…" oninput="filterTable()"/>
                </div>
                <select class="filter-select" id="type-filter" onchange="filterTable()">
                    <option value="">Tous les types</option>
                    <option value="PARTICULIER">Particulier</option>
                    <option value="ENTREPRISE">Entreprise</option>
                    <option value="ASSOCIATION">Association</option>
                </select>
            </div>

            <!-- TABLE -->
            <div th:if="${donateurs == null or donateurs.isEmpty()}" class="empty-state">
                <div class="empty-icon">👥</div>
                <div class="empty-title">Aucun donateur</div>
                <div class="empty-sub">Ajoutez votre premier donateur</div>
            </div>

            <table th:if="${donateurs != null and !donateurs.isEmpty()}" id="donors-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nom</th>
                        <th>Email</th>
                        <th>Type</th>
                        <th>Dons</th>
                        <th>Total donné</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="d, iter : ${donateurs}" th:attr="data-nom=${d.nom},data-type=${d.type}">
                        <td class="id-cell" th:text="${iter.index + 1}">1</td>
                        <td><strong th:text="${d.nom}">Nom</strong></td>
                        <td class="muted" th:text="${d.email}">email</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${d.type.name() == 'PARTICULIER'} ? 'badge-blue' : (${d.type.name() == 'ENTREPRISE'} ? 'badge-purple' : 'badge-green')"
                                  th:text="${d.type}">TYPE</span>
                        </td>
                        <td th:text="${d.nombreDons}">0</td>
                        <td class="amount" th:text="${#numbers.formatDecimal(d.totalDonne, 0, 'COMMA', 2, 'POINT')} + ' MAD'">0 MAD</td>
                        <td>
                            <div style="display:flex;gap:6px">
                                <button class="btn btn-secondary btn-sm"
                                        th:attr="
            data-id=${d.id},
            data-nom=${d.nom},
            data-email=${d.email},
            data-type=${d.type}"
                                        onclick="handleEditDonateur(this)">
                                    ✏️ Modifier
                                </button>
                                <form th:action="@{/donateurs/delete/{id}(id=${d.id})}" method="post"
                                      onsubmit="return confirm('Supprimer ce donateur ?')">
                                    <button type="submit" class="btn btn-danger btn-sm">🗑</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<!-- MODAL CRÉATION -->
<div class="modal-overlay" id="modal-donateur">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">Nouveau Donateur</div>
            <button class="modal-close" onclick="closeModal('modal-donateur')">×</button>
        </div>
        <form th:action="@{/donateurs}" method="post">
            <div class="form-grid">
                <div class="form-group full">
                    <label class="form-label">Nom complet *</label>
                    <input class="form-input" type="text" name="nom" placeholder="Nom / Raison sociale" required/>
                </div>
                <div class="form-group full">
                    <label class="form-label">Email *</label>
                    <input class="form-input" type="email" name="email" placeholder="contact@exemple.com" required/>
                </div>
                <div class="form-group full">
                    <label class="form-label">Type *</label>
                    <select class="form-input" name="type">
                        <option value="PARTICULIER">Particulier</option>
                        <option value="ENTREPRISE">Entreprise</option>
                        <option value="ASSOCIATION">Association</option>
                    </select>
                </div>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal('modal-donateur')">Annuler</button>
                <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
            </div>
        </form>
    </div>
</div>

<!-- MODAL MODIFICATION -->
<div class="modal-overlay" id="modal-edit-donateur">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">Modifier le Donateur</div>
            <button class="modal-close" onclick="closeModal('modal-edit-donateur')">×</button>
        </div>
        <form id="form-edit-donateur" method="post">
            <div class="form-grid">
                <div class="form-group full">
                    <label class="form-label">Nom complet *</label>
                    <input class="form-input" type="text" name="nom" id="edit-don-nom" required/>
                </div>
                <div class="form-group full">
                    <label class="form-label">Email *</label>
                    <input class="form-input" type="email" name="email" id="edit-don-email" required/>
                </div>
                <div class="form-group full">
                    <label class="form-label">Type *</label>
                    <select class="form-input" name="type" id="edit-don-type">
                        <option value="PARTICULIER">Particulier</option>
                        <option value="ENTREPRISE">Entreprise</option>
                        <option value="ASSOCIATION">Association</option>
                    </select>
                </div>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal('modal-edit-donateur')">Annuler</button>
                <button type="submit" class="btn btn-primary">💾 Enregistrer</button>
            </div>
        </form>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
<script>
function openEditDonateur(id, nom, email, type) {
    document.getElementById('form-edit-donateur').action = '/donateurs/edit/' + id;
    document.getElementById('edit-don-nom').value   = nom;
    document.getElementById('edit-don-email').value = email;
    document.getElementById('edit-don-type').value  = type;
    openModal('modal-edit-donateur');
}

function filterTable() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const type   = document.getElementById('type-filter').value;
    document.querySelectorAll('#donors-table tbody tr').forEach(row => {
        const nom     = (row.dataset.nom  || '').toLowerCase();
        const rowType = (row.dataset.type || '');
        const matchSearch = nom.includes(search);
        const matchType   = !type || rowType === type;
        row.style.display = (matchSearch && matchType) ? '' : 'none';
    });
}
</script>
</body>
</html>
