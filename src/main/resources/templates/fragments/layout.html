<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:replace="~{::title}">DonCausa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <th:block th:replace="~{::head-extra}"></th:block>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon">🌿</div>
        <h1>DonCausa</h1>
        <p>Association &amp; ONG</p>
    </div>
    <nav class="nav-section">
        <div class="nav-section-label">Navigation</div>
        <a class="nav-item" th:classappend="${activePage == 'dashboard'} ? 'active'" th:href="@{/}">
            <span class="icon">📊</span> Tableau de bord
        </a>
        <a class="nav-item" th:classappend="${activePage == 'campagnes'} ? 'active'" th:href="@{/campagnes}">
            <span class="icon">🎯</span> Campagnes
        </a>
        <a class="nav-item" th:classappend="${activePage == 'donateurs'} ? 'active'" th:href="@{/donateurs}">
            <span class="icon">👥</span> Donateurs
        </a>
        <a class="nav-item" th:classappend="${activePage == 'dons'} ? 'active'" th:href="@{/dons}">
            <span class="icon">💰</span> Dons
        </a>
    </nav>
</aside>

<!-- MAIN -->
<main class="main">
    <div class="topbar">
        <div>
            <h2 th:replace="~{::page-title}">Page</h2>
            <div class="topbar-sub" th:replace="~{::page-sub}"></div>
        </div>
        <div class="topbar-actions" th:replace="~{::topbar-actions}"></div>
    </div>

    <div class="page-content" th:replace="~{::page-content}"></div>
</main>

<!-- MODAL placeholder -->
<th:block th:replace="~{::modals}"></th:block>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
